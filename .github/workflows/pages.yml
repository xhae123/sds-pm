name: Build and publish bundle

on:
  push:
    branches: [main]
    paths:
      - CONTEXT.md
      - MEMORY.md
      - course/**
      - scripts/build-bundle.sh
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build bundle
        run: bash scripts/build-bundle.sh _site

      # raw.githubusercontent.com 경로로도 즉시 fetch 되도록 루트에 커밋
      - name: Commit bundle.txt to main
        run: |
          cp _site/bundle.txt bundle.txt
          if git diff --quiet bundle.txt; then
            echo "bundle.txt unchanged — skipping commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add bundle.txt
            git commit -m "chore(bundle): auto-update [skip ci]"
            git push
          fi

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
